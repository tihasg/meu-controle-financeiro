<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- Background gradient -->
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#10B981;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#059669;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" fill="url(#grad1)"/>

  <!-- Money/Currency symbol -->
  <g transform="translate(256, 256)">
    <!-- Dollar sign circle background -->
    <circle cx="0" cy="0" r="150" fill="#ffffff" opacity="0.15"/>

    <!-- Dollar sign -->
    <text x="0" y="0" font-size="200" font-weight="bold" fill="white" text-anchor="middle" dominant-baseline="central">$</text>

    <!-- Decorative circles -->
    <circle cx="-80" cy="-80" r="25" fill="#ffffff" opacity="0.3"/>
    <circle cx="100" cy="80" r="20" fill="#ffffff" opacity="0.2"/>
  </g>

  <!-- Optional: Add a subtle pattern -->
  <rect width="512" height="512" fill="white" opacity="0.02"/>
</svg>

